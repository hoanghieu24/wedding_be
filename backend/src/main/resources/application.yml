server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://${MYSQLHOST:localhost}:${MYSQLPORT:3306}/${MYSQLDATABASE:happy_wedding}?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Ho_Chi_Minh
    username: ${MYSQLUSER:root}
    password: ${MYSQLPASSWORD:1234567}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 20MB

app:
  upload:
    dir: uploads
  jwt:
    secret: ${JWT_SECRET:change-this-to-a-very-long-secret-key-for-production-1234567890}
    expiration: 86400000
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,https://happyweddingduytrungvathutrang.io.vn}

cloudinary:
  cloud-name: ${CLOUDINARY_CLOUD_NAME:dzdldby9a}
  api-key: ${CLOUDINARY_API_KEY:284794214218767}
  api-secret: ${CLOUDINARY_API_SECRET:2jPTF3qpW83PXfOUKFefh4ovI6U}
